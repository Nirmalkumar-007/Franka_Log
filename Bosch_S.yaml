safety:
  require_home_on_start: true
  max_joint_error_rad: 0.05
motion:
  default_control_rate_hz: 15
  steps_per_segment: 300
stiffness:
  translational_x: 2000  # N/m
  translational_y: 2000  # N/m
  translational_z: 600  # N/m
  rotational_x: 30.0  # Nm/rad
  rotational_y: 30.0  # Nm/rad
  rotational_z: 30.0  # Nm/rad
  damping_ratio: 1.0
  nullspace_stiffness: 0.5 
  
orientation:
  tilt_sideways_deg: 0
  tilt_forward_deg: 0
waypoints:
  - name: HOME  # 0
    offset: [0.0, 0.0, 0.0]
  
  # REGION 1 
  - name: A1  # 1
    offset: [0.28, -0.07, -0.38]
    control_rate_hz: 40  
  - name: A2  # 2
    offset: [0.28, 0.23, -0.38]
    control_rate_hz: 5  
  # REGION 2   
  - name: A3  # 3
    offset: [0.26, 0.23, -0.38]
    control_rate_hz: 120      
  - name: A4  # 4
    offset: [0.26, -0.07, -0.38]
    control_rate_hz: 5          
  # REGION 3    
  - name: A5  # 5
    offset: [0.24, -0.07, -0.38]
    control_rate_hz: 120  
  - name: A6  # 6
    offset: [0.24, 0.23, -0.38]
    control_rate_hz: 5      
  # REGION 4    
  - name: A7  # 7PandaTrajectory_log
    offset: [0.22, 0.23, -0.38]
    control_rate_hz: 120  
  - name: A8  # 8
    offset: [0.22, -0.07, -0.38]
    control_rate_hz: 5 
    
  - name: HOME  # 9
    offset: [0.0, 0.0, 0.0]
    control_rate_hz: 20
  
pause_behavior:
  pause_at_indices: [1, 6, 7, 8]
