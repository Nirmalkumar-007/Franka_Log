safety:
  require_home_on_start: true
  max_joint_error_rad: 0.05
motion:
  default_control_rate_hz: 15
  steps_per_segment: 400
stiffness:
  translational_x: 2000  # N/m
  translational_y: 2000  # N/m
  translational_z: 2000  # N/m
  rotational_x: 30.0  # Nm/rad
  rotational_y: 30.0  # Nm/rad
  rotational_z: 30.0  # Nm/rad
  damping_ratio: 1.0
  
orientation:
  tilt_sideways_deg: 0
  tilt_forward_deg: 0
waypoints:
  - name: HOME  # 0
    offset: [0.0, 0.0, 0.0]
  
  # REGION 1 - Straight line trajectory
  - name: A1  # 1
    offset: [0.275, -0.09, -0.20]
    control_rate_hz: 40  
  - name: A2  # 2
    offset: [0.275, 0.28, -0.20]
    control_rate_hz: 6
  - name: A2  # 3
    offset: [0.275, -0.09, -0.20]
    control_rate_hz: 6
  - name: HOME  # 4
    offset: [0.0, 0.0, 0.0]
    control_rate_hz: 20
  
pause_behavior:
  pause_at_indices: [1, 2, 3]
